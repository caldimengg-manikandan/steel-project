services:
  # Backend Web Service
  - type: web
    name: steel-dms-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free # or starter for more resources
    port: 5000
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false # User must set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://steel-dms-frontend.onrender.com # Change after frontend setup
      - key: PYTHON_BIN
        value: python3
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # Frontend Static Site
  - type: web
    name: steel-dms-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
