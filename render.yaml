services:
  # ── Backend — FastAPI (Python) ────────────────────────────
  - type: web
    name: steel-dms-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 5000
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: CORS_ORIGIN
        value: https://steel-dms-frontend.onrender.com
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

staticSites:
  # ── Frontend — React (Vite) ───────────────────────────────
  - name: steel-dms-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://steel-dms-backend.onrender.com/api
